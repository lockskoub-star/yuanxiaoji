version: '3.8'

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yuanxiaoji_agent
    ports:
      - "${PORT:-8000}:8000"
    environment:
      # API 配置
      - COZE_WORKLOAD_IDENTITY_API_KEY=${API_KEY}
      - COZE_INTEGRATION_MODEL_BASE_URL=${MODEL_BASE_URL:-https://api.coze.cn}

      # 服务配置
      - HOST=0.0.0.0
      - PORT=8000

      # 日志配置
      - LOG_LEVEL=INFO

      # 安全配置
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    volumes:
      - ./logs:/app/logs
      - ./assets:/app/assets
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agent_network

  nginx:
    image: nginx:alpine
    container_name: yuanxiaoji_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./assets:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - agent_network

networks:
  agent_network:
    driver: bridge
